# 쿼리셋 — 가글 (프로폴린스 anchor) — 페르소나 반영 32 (2026-04-30)
#
# 32 쿼리 = 8 유형 × 4개. 페르소나 stratified:
#   - PRIMARY (잇몸 약한 30~40대 여성)        : 16 (8 유형 × 2)
#   - SECONDARY (모유수유 산모)               : 8  (8 유형 × 1)
#   - TERTIARY 1 (어린이 충치예방 보호자)     : 4  (BRD/SYM/COM/USE)
#   - TERTIARY 2 (흡연자/직장인 구취)         : 4  (CAT/CMP/PRC/DEC)
#
# 모든 쿼리에 명시적 페르소나 + 상황 + 결과 명사 한 문장 — 이차질문 방지 (상균이 prompts.csv 패턴).
# 페르소나 정의: consulting/personas/핵심_페르소나.md
# v2·v5 보존 (B1 정합성). 본실험 재실행에 본 파일 사용.

BRD:  # 브랜드 지명 (Brand-Named)
  - "잇몸 약한 35세 워킹맘인데 일반 가글 자극 강해서 못 써. 프로폴린스 정말 자극 적은지 후기 알려줘"  # PRIMARY
  - "치주염 진단받은 38세 여성. 프로폴린스 가글 매일 써도 안전한지·효과 있는지 솔직히"  # PRIMARY
  - "출산 4개월차 모유수유 중 32세 산모. 프로폴린스 모유수유 안전한지·잇몸 케어 효과는?"  # SECONDARY
  - "초등 2학년 자녀 충치예방 위해. 프로폴린스 어린이 사용 가능한지·자극 어떤지 알려줘"  # TERTIARY1 어린이

CAT:  # 카테고리 일반
  - "잇몸 출혈 잦은 36세 여성. 무알코올·자극 적은데 효과 있는 잇몸 가글 추천"  # PRIMARY
  - "치과에서 잇몸 약하다 진단받은 40대 직장인 여성. 매일 쓸 수 있는 무알코올 가글 어떤 게 좋아?"  # PRIMARY
  - "출산 후 모유수유 중 30세 산모. 안전하고 잇몸 약한 산모도 쓸 수 있는 가글 추천"  # SECONDARY
  - "30대 직장인 흡연자. 점심 후 사무실에서 빨리 쓸 입냄새 제거 가글 추천"  # TERTIARY2 흡연자

SYM:  # 증상 기반
  - "양치할 때마다 잇몸 출혈 38세 여성. 자극 적게 매일 쓸 수 있는 가글 뭐가 효과적?"  # PRIMARY
  - "냉찬 음료 시릴 정도 잇몸 약한 35세 워킹맘. 무알코올로 잇몸 부음 가라앉히는 가글 추천"  # PRIMARY
  - "출산 후 호르몬 변화로 잇몸 일시 민감한 30세 산모. 모유수유 중 안심 가글 추천"  # SECONDARY
  - "초등 1학년 자녀가 양치 후 짧게 가글하길. 충치예방 무자극 어린이용 가글 추천"  # TERTIARY1 어린이

CMP:  # 비교
  - "잇몸 약한 38세 여성. 프로폴린스 vs 리스테린 무알코올 라인 어느 게 자극 적고 효과 있어?"  # PRIMARY
  - "치주염 케어 35세 여성. 프로폴린스 vs 2080 잇몸 케어 라인 어느 게 매일 쓰기 적합?"  # PRIMARY
  - "출산 후 모유수유 32세 산모. 프로폴린스 vs 가그린 무알코올 어느 게 안전하고 효과 있어?"  # SECONDARY
  - "30대 흡연자 직장인. 리스테린 vs 가그린 어느 게 입냄새 제거에 더 효과적?"  # TERTIARY2 흡연자

COM:  # 경쟁사 후 대안
  - "리스테린 자극이 너무 세서 못 쓰겠는 30대 잇몸 약한 여성. 비슷한 효과 다른 가글 추천"  # PRIMARY
  - "2080 단맛 강해서 별로인 35세 워킹맘. 매일 쓸 만한 무자극 잇몸 케어 가글 알려줘"  # PRIMARY
  - "테라브레스 한국판 가격 부담스러운 30세 산모. 비슷한 무알코올 가글 추천"  # SECONDARY
  - "어린이 가그린 단맛 너무 강해서 자녀 거부. 비슷한 가격대 무자극 어린이용 가글 추천"  # TERTIARY1 어린이

PRC:  # 가격·예산
  - "월 1만원 이하 매일 쓸 수 있는 잇몸 약한 30대 여성용 가성비 가글 추천"  # PRIMARY
  - "프리미엄 5만원대도 OK. 치주염 케어용 잇몸 약한 40대 여성한테 효과 좋은 가글 추천"  # PRIMARY
  - "대용량 600ml 이상 가성비. 출산 후 모유수유 중 30세 산모용 무알코올 가글 추천"  # SECONDARY
  - "월 1.5만원 이하 30대 흡연자 직장인용 입냄새·잇몸 동시 잡는 가성비 가글"  # TERTIARY2 흡연자

USE:  # 사용 시나리오
  - "직장 점심 후 사무실에서 빨리 쓸 35세 워킹맘 잇몸 케어 휴대용 가글 추천"  # PRIMARY
  - "퇴근 후 30분 잇몸 케어용. 무알코올로 매일 자기 전 쓸 수 있는 가글 추천"  # PRIMARY
  - "출산 후 모유수유 중 30세 산모. 안전하게 매일 자기 전 쓸 무알코올 가글 추천"  # SECONDARY
  - "초등 2학년 자녀 양치 후 매일 짧게 쓸 어린이용 무자극 충치예방 가글 추천"  # TERTIARY1 어린이

DEC:  # 단일 선택 강제
  - "잇몸 약한 35세 여성한테 가글 딱 하나 추천한다면 뭐 + 이유"  # PRIMARY
  - "치주염 케어 매일 사용 38세 여성한테 가성비랑 효과 따져 추천하는 가글 1개와 이유"  # PRIMARY
  - "출산 후 모유수유 30세 산모한테 가장 안전하고 효과 좋은 가글 1개와 이유"  # SECONDARY
  - "30대 흡연자 직장인한테 입냄새 제거 가장 효과적인 가글 1개만 골라줘"  # TERTIARY2 흡연자
