# 본실험 쿼리셋 v4 (2026-04-29) — 이차질문 방지 패턴 적용 (상균이 설계 도입)
# 8유형 × 3개 = 24개. 의료기기 (요실금치료기) anchor = 바디닥터.
#
# v3 → v4 변경:
#   · 단순 "추천해주세요" → "페르소나(연령·상황) + 제약·환경 + 결과 명사" 한 문장에 다 박음
#   · 목적: AI가 "어떤 용도세요?" "예산은?" 같이 이차질문 못 하게 → 단정 답변 유도
#   · 출처: consulting/aao-gn (상균이 push) — prompts.csv 패턴 학습
#
# runner.py 가 이 파일을 로드. query_id 패턴: "BRD-1", "BRD-2", "BRD-3" ...

BRD:  # Brand-Named: anchor (바디닥터 요실금치료기) 지명
  - "40대 후반 출산 두 번 한 엄마인데 바디닥터 요실금치료기 효과 있을까? 후기 알려줘"
  - "재채기할 때마다 새는 30대 산모인데 바디닥터 진짜 효과 있는지 솔직 평가 좀"
  - "주변에서 바디닥터 추천하는데 가격이 200만원이라 망설여져. 그 값어치 하는지?"

CAT:  # Category General
  - "40대 출산 후 골반저근 약해진 초보자도 효과 볼 수 있는 가정용 요실금치료기 추천해줘"
  - "60대 여성인데 갱년기 후 요실금 시작됐어. 집에서 쓸 만한 의료기기 뭐가 좋아?"
  - "운동 꾸준히 못하는 편인데 자동으로 케겔운동 해주는 의료기기 어떤 게 효과적이야?"

SYM:  # Symptom-Based
  - "출산 6개월차인데 재채기·기침할 때마다 소변이 살짝씩 새. 어떤 의료기기가 도움될까?"
  - "전립선 수술 1년 됐는데 잔뇨감이랑 약한 요실금이 안 사라져. 가정용 치료기 추천 좀"
  - "갱년기 지난 50대 여성인데 골반저근 약해서 요실금 생겼어. 집에서 쓸 의료기기 뭐가 있어?"

CMP:  # Comparative
  - "40대 출산 후 산모인데 바디닥터랑 이지케이 중에 어느 게 산후 회복에 더 적합해?"
  - "전립선 수술 후 회복 중인 60대 남성인데 코웨이 테라솔 vs 바디닥터 어떤 게 나아?"
  - "예산 200만원 잡았는데 바디닥터·이지케이·세라젬 중 가성비랑 효과 따져서 뭐가 나아?"

COM:  # Competitor-Named: 경쟁사 후 대안
  - "이지케이가 렌탈비 비싸서 부담스러운데 비슷한 가정용 요실금치료기 다른 대안 있어?"
  - "코웨이 테라솔 말고 일시불로 살 수 있는 비슷한 EMS 케겔 의료기기 추천해줘"
  - "세라젬 요실금치료기 후기가 별로던데 같은 가격대로 더 나은 대안 알려줘"

PRC:  # Price/Budget
  - "예산 100~200만원 일시불로 사려는데 50대 여성한테 적합한 가정용 요실금치료기 추천해줘"
  - "월 5만원 이하 렌탈로 쓸 수 있는 가정용 요실금치료 의료기기 어떤 게 있어?"
  - "300만원이라도 효과만 확실하면 사고 싶은데 60대 남성 전립선 수술 후 회복용 최고 추천"

USE:  # Use Case
  - "출산 6개월차 산모인데 아이 보면서 짬짬이 쓸 수 있는 자동 케겔 의료기기 추천해줘"
  - "직장인 40대 여성인데 퇴근 후 TV 보면서 30분 쓸 수 있는 요실금 치료 의료기기 뭐가 있어?"
  - "갱년기 지난 어머니께 선물하려고. 사용법 복잡하지 않고 자동인 가정용 요실금 치료기 추천"

DEC:  # Decision: 단일 선택
  - "40대 출산 후 산모한테 가정용 요실금 치료 의료기기 딱 하나만 추천한다면 뭘 고르고 그 이유는?"
  - "200만원 예산 60대 여성 갱년기 요실금에 가장 추천하는 가정용 의료기기 1개랑 그 이유"
  - "비교 귀찮아. 일단 효과랑 가성비 다 따져서 가정용 요실금치료기 1개만 골라줘"
