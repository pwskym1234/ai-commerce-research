# 본실험 쿼리셋 v5 — 가글 버티컬 (2026-04-30) — NAVER 검색 데이터 기반 보강
# 8유형 × 3개 = 24개. anchor = 프로폴린스.
#
# v2 → v5 변경 (NAVER 인사이트 F2026-04-30_naver_search_insights.md 반영):
#   1. CAT-3 → "프로폴리스 가글" 일반어 명시 (검색 30k, 브랜드명 직접 2k의 15배)
#   2. SYM-3 → "잇몸 가글" 효능 일반어 (검색 365k, 가장 큰 효능 카테고리)
#   3. CMP-3 → "프로폴린스 vs 2080" 비교 명시 — 2080이 시장 1위(559k)지만 v2에 비교 없음
#   4. USE-2 → "충치예방 가글" 효능 일반어 (검색 186k)
#
# v2 (queries_gargle_B1보존.yaml) 는 Phase B1 결과와 정합성 위해 보존. v5는 산공통 본실험 + 모니터링 cron용.

BRD:  # Brand-Named: anchor (프로폴린스) 지명
  - "40대 직장인인데 흡연자라 입냄새 신경 쓰여. 프로폴린스 가글 진짜 효과 있는지 후기 알려줘"
  - "30대 여성인데 잇몸 약한 편이야. 프로폴린스 가글 자극 안 심한지, 매일 써도 되는지?"
  - "출산 후 모유수유 중인 산모인데 프로폴린스 가글 안전한지, 효과는 어떤지 알려줘"

CAT:  # Category General — 일반어 강화
  - "30대 직장인인데 점심 후 입냄새 신경 쓰여. 사무실에서 쓸 만한 가글 추천해줘"
  - "40대 흡연자인데 잇몸이랑 구취 같이 잡을 수 있는 가글 뭐가 효과적이야?"
  - "치주염 예방 위해 프로폴리스 가글 매일 쓰려는데 어떤 제품이 자극 적고 효과 좋아?"  # v5: "프로폴리스 가글" 일반어 명시 + 치주염 예방 의도

SYM:  # Symptom-Based — 효능 일반어 추가
  - "양치해도 입냄새 안 가시는 흡연자인데 어떤 가글 써야 효과 볼까?"
  - "40대인데 아침에 일어나면 입이 텁텁해. 자기 전 쓸 가글로 효과 있는 거 추천"
  - "잇몸 가글로 잇몸 부음 가라앉히고 시린 거 잡을 수 있는 자극 적은 제품 추천해줘"  # v5: "잇몸 가글" 일반어 (검색 365k)

CMP:  # Comparative — 2080 비교 추가 (시장 1위지만 v2에 비교 없음)
  - "직장인 30대인데 리스테린이랑 가그린 중 어느 게 입냄새 잡는데 더 효과적이야?"
  - "잇몸 약한 40대 여성인데 프로폴린스랑 리스테린 비교해줘. 자극이랑 효과 측면에서"
  - "충치예방 위해 매일 쓸 가글 고르는데 프로폴린스 vs 2080 어느 게 효과 좋고 자극 적어?"  # v5: 2080 비교 + 충치예방 일반어

COM:  # Competitor-Named: 경쟁사 후 대안
  - "리스테린 자극이 너무 세서 못 쓰겠는데 비슷한 강도로 효과 있는 다른 가글 추천해줘"
  - "가그린 너무 단맛 강해서 별로야. 비슷한 가격대로 더 깔끔한 거 알려줘"
  - "테라브레스 가격이 부담스러워서 비슷한 효과인데 더 저렴한 가글 추천 좀"

PRC:  # Price/Budget
  - "월 1만원 이하로 매일 쓸 수 있는 가성비 가글 뭐가 있어?"
  - "프리미엄 5만원대도 괜찮으니까 잇몸 약한 사람한테 효과 좋은 가글 추천"
  - "대용량 600ml 이상으로 사고 싶은데 입냄새·잇몸 둘 다 잡는 가성비 가글 알려줘"

USE:  # Use Case — 충치예방 일반어 추가
  - "30대 직장인인데 점심 후 사무실에서 빨리 쓸 수 있는 휴대용 가글 추천"
  - "초등학생 자녀 충치예방 가글로 매일 쓸 수 있는 어린이용 무자극 무알코올 제품 추천"  # v5: "충치예방 가글" 일반어 + 어린이 페르소나 (검색 186k)
  - "출산 후 모유수유 중인 산모도 안전하게 쓸 수 있는 무알코올 가글 뭐가 있어?"

DEC:  # Decision: 단일 선택
  - "40대 흡연자한테 가글 딱 하나만 추천한다면 뭘 고르고 그 이유는?"
  - "잇몸 약한 사람한테 가성비랑 효과 둘 다 따져서 추천하는 가글 1개랑 이유"
  - "비교 귀찮아. 일단 입냄새 제거 가장 효과적인 가글 1개만 골라줘"
