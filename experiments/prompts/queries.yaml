# 본실험 쿼리셋 (v2) — 8유형 × 3개씩 = 24개
# runner.py 가 이 파일을 로드해서 사용

BRD:  # Brand-Named: 브랜드 지명
  - "바디닥터 요실금치료기 어떤가요? 실제로 효과 있나요?"
  - "GN그룹 바디닥터 케겔운동기 사용한 사람들 후기 궁금해요. 살만해요?"
  - "바디닥터 자동 케겔운동기 의료기기 성능이랑 식약처 인증 알려줘."

CAT:  # Category General: 일반 카테고리
  - "가정에서 쓸 수 있는 케겔운동기 추천해주세요."
  - "골반저근 강화 자동 케겔운동 기기 뭐가 좋아요?"
  - "요실금 예방을 위해 집에서 쓸만한 의료기기 추천 부탁해."

SYM:  # Symptom-Based: 증상 해결
  - "출산 후 1년 됐는데 재채기할 때 요실금 증상이 있어요. 어떤 제품이 도움될까요?"
  - "50대인데 갱년기 이후 요실금이 시작됐어요. 가정에서 쓸 수 있는 치료 기기 추천해주세요."
  - "전립선 수술 이후 골반저근이 약해진 것 같은데, 회복에 도움 되는 의료기기 알려주세요."

CMP:  # Comparative: 비교
  - "바디닥터랑 이지케이 요실금치료기 어느 게 더 나아요?"
  - "케겔운동기 중에서 바디닥터, 세라젬, 퓨런 비교하면 어떤 차이가 있나요?"
  - "바디닥터 vs 닥터케이 저주파 EMS, 효과·가격·안전성 비교해줘."

COM:  # Competitor-Named: 경쟁사 지명 후 대안
  - "이지케이 EASY-K 말고 비슷한 가정용 케겔운동기 추천해줘."
  - "세라젬 요실금치료기 외에 다른 국내 의료기기 중에 괜찮은 거 있나요?"
  - "닥터케이 저주파 EMS가 관심 가는데, 비슷한 성능의 식약처 3등급 의료기기 추천해주세요."

PRC:  # Price/Budget: 가격·예산
  - "200만원 정도 예산으로 구매할 수 있는 가정용 요실금치료기 추천해주세요."
  - "100만~300만원대 식약처 인증 케겔운동 의료기기 추천 부탁해."
  - "렌탈 말고 일시불 구매로 250만원 이하 가정용 EMS 케겔운동기 뭐가 좋아요?"

USE:  # Use Case: 유스케이스
  - "출산 후 6개월 차 산후 회복용으로 앉아서 TV 보면서 사용할 수 있는 기기 추천."
  - "사무실이나 집에서 편하게 앉아 있으면서 자동으로 케겔운동 할 수 있는 의료기기 알려주세요."
  - "40대 여성인데 갱년기 골반저근 관리를 매일 15분씩 할 수 있는 제품 추천."

DEC:  # Decision: 구매 의도 (단일 선택 강제)
  - "케겔운동 의료기기 딱 하나만 골라주세요. 추천 근거와 함께요."
  - "요실금치료기 추천을 한 가지만 말해주세요. 이유도 설명해주세요."
  - "가정용 EMS 케겔운동기 중 가장 추천하는 1개 제품과 그 이유를 말해줘."
