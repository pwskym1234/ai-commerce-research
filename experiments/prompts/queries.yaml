# 본실험 쿼리셋 v2.1 — 친구 대시보드 교훈 반영 (구어체 다양성)
# 8유형 × 3개씩 = 24개
# 각 유형 3개는 (1) 존댓말 완성문 + (2) 반말 짧은 문장 + (3) 구어체 불완전/문제 상황
#
# runner.py 가 이 파일을 로드. query_id 패턴: "BRD-1", "BRD-2", "BRD-3" ...

BRD:  # Brand-Named: 브랜드 지명
  - "바디닥터 요실금치료기는 어떤 제품인가요? 실제 효과 있나요?"
  - "바디닥터 써본 사람 있어? 살만해?"
  - "바디닥터 요실금치료기 사려는데 좀 알려줘봐"

CAT:  # Category General: 일반 카테고리
  - "가정에서 쓸 수 있는 케겔운동기를 추천해주세요."
  - "케겔운동기 뭐가 좋아?"
  - "골반저근 운동 기기 사야 되는데 뭐부터 보면 돼"

SYM:  # Symptom-Based: 증상 해결
  - "출산 후 1년이 됐는데 재채기할 때 요실금 증상이 있습니다. 어떤 제품이 도움이 될까요?"
  - "요새 계속 소변 새는 느낌 드는데 집에서 쓸 수 있는 거 뭐 있어?"
  - "전립선 수술하고 나서 힘이 없어진 거 같은데 어떡해"

CMP:  # Comparative: 비교
  - "바디닥터와 이지케이 중 어느 제품이 더 적합할까요?"
  - "바디닥터 vs 이지케이 뭐가 나아?"
  - "바디닥터 이지케이 세라젬 퓨런 중에 뭐 사지"

COM:  # Competitor-Named: 경쟁사 지명 후 대안
  - "이지케이(EASY-K) 외에 비슷한 가정용 케겔운동기를 추천해주세요."
  - "이지케이 말고 다른 거 뭐 있어?"
  - "코웨이 테라솔 저주파 EMS 말고 다른 거 없나 알려줘봐"

PRC:  # Price/Budget: 가격·예산
  - "200만 원 정도 예산으로 구매 가능한 가정용 요실금치료기를 추천해주세요."
  - "100만원대 케겔운동 의료기기 뭐 좋아?"
  - "렌탈 말고 현금 250만원 이하로 살만한 거"

USE:  # Use Case: 유스케이스
  - "출산 후 6개월 차 산후 회복용으로 앉아서 TV 보면서 사용할 수 있는 기기를 추천해주세요."
  - "집에서 앉아만 있어도 자동으로 되는 거 뭐 있어?"
  - "갱년기 지나고 아랫배 힘 빠진 느낌인데 매일 15분 쓸 거 뭐 있지"

DEC:  # Decision: 구매 의도 (단일 선택 강제)
  - "가정용 케겔운동 의료기기 중 가장 추천하는 1개 제품과 그 이유를 말씀해 주세요."
  - "하나만 딱 골라줘"
  - "고르기 귀찮으니까 그냥 한 개만 추천"
