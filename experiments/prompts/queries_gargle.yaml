# 본실험 쿼리셋 v1 — 가글 버티컬 (2026-04-25 신규)
# 8유형 × 3개 = 24개. 출처: 네이버 지식iN/카페/블로그 쿼리풀 + 수동 보강
# 기준: "실제 유저가 자주 묻는 패턴"

BRD:  # Brand-Named: 우리 anchor (프로폴린스) 지명
  - "프로폴린스 가글 효과 있나요? 써본 사람 후기 알려주세요"
  - "프로폴린스 가글 진짜 입냄새 없어지나요?"
  - "프로폴린스 어떤 향이 가장 인기 있나요?"

CAT:  # Category General
  - "가글 추천해주세요"
  - "구강청결제 뭐가 좋은가요?"
  - "입냄새 없애는 가글 좀 알려주세요"

SYM:  # Symptom-Based
  - "구취가 심한데 가글 어떤 게 효과 있나요?"
  - "잇몸이 부어서 쓸 만한 가글 알려주세요"
  - "흡연자 입냄새 제거에 좋은 가글 추천해주세요"

CMP:  # Comparative
  - "리스테린 vs 가그린 어떤 게 더 나아요?"
  - "프로폴린스랑 리스테린 비교해주세요"
  - "테라브레스랑 어썸쿨 중 뭐가 좋아요?"

COM:  # Competitor-Named: 경쟁사 후 대안
  - "리스테린 외에 비슷한 가글 추천해주세요"
  - "가그린 말고 다른 가글 뭐가 있나요?"
  - "테라브레스 대신 쓸 만한 가글 알려주세요"

PRC:  # Price/Budget
  - "1만원 이하 가성비 가글 추천해주세요"
  - "프리미엄 5만원대 가글 뭐가 있나요?"
  - "대용량 600ml 이상 가성비 가글 추천"

USE:  # Use Case
  - "매일 식후에 사용할 수 있는 순한 가글 알려주세요"
  - "출산 후 산모도 안전하게 쓸 수 있는 가글 있나요?"
  - "어린이가 쓸 수 있는 무알코올 가글 추천해주세요"

DEC:  # Decision: 단일 선택
  - "구강청결제 중 가장 추천하는 1개와 이유를 말해주세요"
  - "딱 하나만 골라주세요"
  - "고민하기 싫은데 가글 하나만 추천해주세요"
