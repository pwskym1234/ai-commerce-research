# 본실험 쿼리셋 v5 (2026-04-30) — NAVER 검색 데이터 기반 보강
# 8유형 × 3개 = 24개. 의료기기 (요실금치료기) anchor = 바디닥터.
#
# v4 → v5 변경 (NAVER 인사이트 F2026-04-30_naver_search_insights.md 반영):
#   1. CMP-3 → "EASY-K (영문 표기)" 명시 — 영문 검색이 한글 대비 44배. 산공통 H1 검정에 영향
#   2. SYM-3 → "복압성 요실금" 의학 용어 추가 — 검색 48k, LLM이 의학어 응답 시 인용 가능성
#   3. CAT-2 → "갱년기 요실금" 키워드 명시 강화 — 검색 120k의 페르소나 정확 노출
#   4. COM-3 → 글로벌 브랜드 (Perifit) 명시 — 한국 검색 zero지만 LLM 응답 강함. H10 직접 검정용
#   5. USE-3 → "산후 회복" 일반어 풀 강화 (검색 916k)
#
# v4 (queries_medical_B1보존.yaml) 는 Phase B1 결과와 정합성 위해 보존. v5는 산공통 본실험 + 모니터링 cron용.
#
# runner.py 가 이 파일을 로드. query_id 패턴: "BRD-1", "BRD-2", "BRD-3" ...

BRD:  # Brand-Named: anchor (바디닥터 요실금치료기) 지명
  - "40대 후반 출산 두 번 한 엄마인데 바디닥터 요실금치료기 효과 있을까? 후기 알려줘"
  - "재채기할 때마다 새는 30대 산모인데 바디닥터 진짜 효과 있는지 솔직 평가 좀"
  - "주변에서 바디닥터 추천하는데 가격이 200만원이라 망설여져. 그 값어치 하는지?"

CAT:  # Category General — 검색량 1순위 일반어 우선
  - "40대 출산 후 골반저근 약해진 초보자도 효과 볼 수 있는 가정용 요실금치료기 추천해줘"
  - "60대 여성인데 갱년기 요실금 시작됐어. 집에서 쓸 만한 가정용 의료기기 뭐가 좋아?"  # v5: "갱년기 요실금" 명시 (검색 120k)
  - "운동 꾸준히 못하는 편인데 자동으로 케겔운동 해주는 의료기기 어떤 게 효과적이야?"

SYM:  # Symptom-Based — 의학 용어 추가 (LLM 의학어 응답 흡수)
  - "출산 6개월차인데 재채기·기침할 때마다 소변이 살짝씩 새. 어떤 의료기기가 도움될까?"
  - "전립선 수술 1년 됐는데 잔뇨감이랑 약한 요실금이 안 사라져. 가정용 치료기 추천 좀"
  - "산부인과에서 복압성 요실금 진단받은 50대 여성인데 약물 말고 가정용 EMS 의료기기로 효과 볼 수 있을까?"  # v5: "복압성 요실금" 의학어 (검색 48k) + 약물 대체 의도

CMP:  # Comparative — EASY-K 영문 표기 명시 (영문 검색 44배)
  - "40대 출산 후 산모인데 바디닥터랑 이지케이 중에 어느 게 산후 회복에 더 적합해?"
  - "전립선 수술 후 회복 중인 60대 남성인데 코웨이 테라솔 vs 바디닥터 어떤 게 나아?"
  - "200만원 예산 출산 후 30대 산모인데 EASY-K(이지케이)랑 바디닥터 중 산후 회복용으로 어느 게 효과 좋아?"  # v5: "EASY-K" 영문 명시 + 산후 회복 일반어

COM:  # Competitor-Named: 경쟁사 후 대안 — 글로벌 브랜드 추가 (H10 검정용)
  - "이지케이가 렌탈비 비싸서 부담스러운데 비슷한 가정용 요실금치료기 다른 대안 있어?"
  - "코웨이 테라솔 말고 일시불로 살 수 있는 비슷한 EMS 케겔 의료기기 추천해줘"
  - "Perifit이나 Elvie Trainer 같은 해외 케겔 의료기기 vs 한국에서 살 수 있는 가정용 (이지케이/바디닥터) 어떤 게 더 효과적이야?"  # v5: 글로벌 vs 국내 (H10 직접 검정)

PRC:  # Price/Budget
  - "예산 100~200만원 일시불로 사려는데 50대 여성한테 적합한 가정용 요실금치료기 추천해줘"
  - "월 5만원 이하 렌탈로 쓸 수 있는 가정용 요실금치료 의료기기 어떤 게 있어?"
  - "300만원이라도 효과만 확실하면 사고 싶은데 60대 남성 전립선 수술 후 회복용 최고 추천"

USE:  # Use Case — 산후 회복 일반어 풀 강화 (검색 916k)
  - "출산 6개월차 산모인데 아이 보면서 짬짬이 쓸 수 있는 자동 케겔 의료기기 추천해줘"
  - "직장인 40대 여성인데 퇴근 후 TV 보면서 30분 쓸 수 있는 요실금 치료 의료기기 뭐가 있어?"
  - "산후 회복 시기 30대 산모랑 갱년기 60대 어머니가 같이 쓸 수 있는 가정용 요실금 의료기기 추천해줘"  # v5: 산후 회복 + 갱년기 멀티 페르소나, 일반어 풀 노출

DEC:  # Decision: 단일 선택
  - "40대 출산 후 산모한테 가정용 요실금 치료 의료기기 딱 하나만 추천한다면 뭘 고르고 그 이유는?"
  - "200만원 예산 60대 여성 갱년기 요실금에 가장 추천하는 가정용 의료기기 1개랑 그 이유"
  - "비교 귀찮아. 일단 효과랑 가성비 다 따져서 가정용 요실금치료기 1개만 골라줘"
