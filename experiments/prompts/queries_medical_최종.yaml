# 쿼리셋 — 의료기기 (바디닥터 anchor) — 페르소나 반영 32 (2026-04-30)
#
# 32 쿼리 = 8 유형 × 4개. 페르소나 stratified:
#   - PRIMARY (산후 회복기 30대 산모)            : 16 (8 유형 × 2)
#   - SECONDARY (갱년기 50~60대 여성, 복압성)    : 8  (8 유형 × 1)
#   - TERTIARY 1 (전립선 수술 후 60대 남성)       : 4  (BRD/SYM/COM/USE)
#   - TERTIARY 2 (예방 관심 30대 여성)           : 4  (CAT/CMP/PRC/DEC)
#
# 모든 쿼리에 *명시적 페르소나 + 상황 + 결과 명사* 한 문장 — 이차질문 방지 패턴 (상균이 prompts.csv 도입).
#   - 페르소나: "출산 6개월차 30대 산모", "갱년기 후 60세 여성" 등
#   - 상황: "재채기 시 살짝 새는", "200만원 예산", "월 5만원 이하 렌탈"
#   - 결과 명사: "추천해줘", "효과 있는지", "1개 골라줘" 등
#
# 페르소나 정의: consulting/personas/핵심_페르소나.md
# v4·v5 보존 (B1 정합성). 본실험 *재실행*에 본 파일 사용.
# runner.py 가 이 파일 로드 — query_id 패턴: BRD-1, BRD-2, BRD-3, BRD-4, ...

BRD:  # 브랜드 지명 (Brand-Named)
  - "출산 6개월차 32세 산모인데 친구가 바디닥터 요실금치료기 추천해. 효과 있는지 솔직 후기 알려줘"  # PRIMARY
  - "두 번 출산 후 38세 워킹맘인데 바디닥터 200만원 가격이 그 값어치 하는지 후기 알려줘"  # PRIMARY
  - "갱년기 후 복압성 요실금 진단받은 55세 여성인데 바디닥터 진짜 효과 있는지 솔직히"  # SECONDARY
  - "전립선 절제술 1년차 65세 남성인데 바디닥터로 요실금 회복에 도움 되는지 후기 알려줘"  # TERTIARY1 전립선

CAT:  # 카테고리 일반 (Category General)
  - "출산 4개월차 30대 산모인데 산부인과에서 케겔 권고받았어. 자동으로 도와주는 가정용 의료기기 추천"  # PRIMARY
  - "출산 후 회복기 35세 워킹맘인데 의식적으로 운동 못 해. 자동 EMS 가정용 의료기기 추천"  # PRIMARY
  - "갱년기 후 복압성 요실금 시작된 58세 여성인데 약물 대체로 가정용 의료기기 추천"  # SECONDARY
  - "증상은 없지만 출산 계획 중인 32세 직장인 여성. 미리 골반저근 강화하는 가정용 의료기기 추천"  # TERTIARY2 예방

SYM:  # 증상 기반 (Symptom-Based)
  - "출산 6개월차 32세 산모인데 재채기·기침 시 살짝 새. 식약처 등록 가정용 치료기 추천"  # PRIMARY
  - "출산 후 1년 30대 산모인데 케겔 운동해도 골반저근 약함 그대로. 의료기기로 효과 볼 수 있을까?"  # PRIMARY
  - "산부인과에서 복압성 요실금 진단받은 56세 여성. 약물 말고 가정용 EMS 의료기기로 효과 볼 수 있어?"  # SECONDARY
  - "전립선 절제술 8개월차 67세 남성인데 잔뇨감·약한 요실금 안 사라져. 가정용 의료기기 추천"  # TERTIARY1 전립선

CMP:  # 비교 (Comparative)
  - "출산 6개월차 33세 산모인데 바디닥터 vs 이지케이 어느 게 산후 회복에 더 적합?"  # PRIMARY
  - "두 번 출산 38세 워킹맘인데 200만원 예산. EASY-K(이지케이) vs 바디닥터 어느 게 효과 좋아?"  # PRIMARY
  - "갱년기 60세 여성. 바디닥터 vs 세라젬 이너핏 어느 게 노년기 사용에 적합?"  # SECONDARY
  - "증상 없는 32세 예방 목적 직장인 여성. Perifit/Elvie Trainer vs 한국 바디닥터/이지케이 어느 게 더 적합?"  # TERTIARY2 예방

COM:  # 경쟁사 후 대안 (Competitor-Named)
  - "이지케이 렌탈비 부담스러운 30대 산모. 비슷한 가정용 요실금 의료기기 다른 대안?"  # PRIMARY
  - "EASY-K 후기가 별로던데 출산 후 회복 30대 여성한테 적합한 다른 가정용 의료기기 추천"  # PRIMARY
  - "코웨이 테라솔 가격 부담스러운 갱년기 50대 여성. 비슷한 효과 다른 EMS 의료기기 추천"  # SECONDARY
  - "세라젬 요실금치료기 후기가 별로. 전립선 수술 후 60대 남성용 비슷한 가격대 대안 알려줘"  # TERTIARY1 전립선

PRC:  # 가격·예산 (Price/Budget)
  - "100~200만원 일시불 예산. 출산 6개월차 30대 산모한테 적합한 가정용 요실금 의료기기 추천"  # PRIMARY
  - "월 5만원 이하 렌탈로 쓸 수 있는 30대 워킹맘용 EMS 케겔 의료기기 어떤 게 있어?"  # PRIMARY
  - "300만원이라도 효과 확실하면 사고 싶은 갱년기 60세 여성용 가정용 요실금 의료기기 추천"  # SECONDARY
  - "예산 100만원 32세 예방 목적 직장인 여성. 가성비 좋은 가정용 EMS 의료기기 추천"  # TERTIARY2 예방

USE:  # 사용 시나리오 (Use Case)
  - "출산 6개월차 산모인데 아이 보면서 짬짬이 15분 쓸 수 있는 자동 케겔 의료기기 추천"  # PRIMARY
  - "출산 휴직 중 33세 산모. 매일 저녁 30분 자동으로 골반저근 운동시키는 의료기기 뭐가 있어?"  # PRIMARY
  - "갱년기 후 60세 어머니께 선물. 사용법 복잡하지 않은 자동 가정용 요실금 의료기기"  # SECONDARY
  - "전립선 수술 회복 중 60대 남성. 누워서 또는 앉아서 쉽게 쓸 수 있는 EMS 가정용 치료기 추천"  # TERTIARY1 전립선

DEC:  # 단일 선택 강제 (Decision)
  - "출산 6개월차 30대 산모한테 가정용 요실금 치료 의료기기 딱 하나 추천한다면 뭐 + 이유"  # PRIMARY
  - "200만원 예산 두 번 출산 38세 산모한테 가장 추천하는 가정용 요실금 의료기기 1개와 이유"  # PRIMARY
  - "갱년기 후 복압성 요실금 60세 여성에게 가장 추천하는 가정용 의료기기 1개와 이유"  # SECONDARY
  - "증상 없지만 예방 관심 32세 직장인 여성에게 가장 추천하는 골반저근 강화 의료기기 1개"  # TERTIARY2 예방
